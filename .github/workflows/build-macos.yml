name: Build macOS Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 150
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app directory
        shell: bash
        run: |
          if [ -d "skills-mcp-beta/frontend" ]; then
            echo "APP_DIR=skills-mcp-beta" >> "$GITHUB_ENV"
          else
            echo "APP_DIR=." >> "$GITHUB_ENV"
          fi
          echo "Resolved APP_DIR file saved to GITHUB_ENV"

      - name: Show build context
        shell: bash
        run: |
          cd "${APP_DIR}"
          echo "APP_DIR=${APP_DIR}"
          pwd
          ls -la
          ls -la mcp-servers || true
          ls -la mcp-servers/open-websearch || true
          ls -la mcp-servers/playwright || true
          ls -la frontend || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: |
            **/frontend/package-lock.json
            **/mcp-servers/open-websearch/package-lock.json
            **/mcp-servers/playwright/package-lock.json
            **/mcp-servers/rednote/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MCP Node dependencies
        shell: bash
        run: |
          cd "${APP_DIR}"
          install_node_deps() {
            local dir="$1"
            if [ ! -d "$dir" ] || [ ! -f "$dir/package.json" ]; then
              echo "Skip $dir (missing package.json)"
              return 0
            fi
            echo "Installing deps for $dir"
            if [ -f "$dir/package-lock.json" ]; then
              npm ci --prefix "$dir"
            else
              npm install --prefix "$dir" --no-audit --no-fund
            fi
          }

          install_node_deps "mcp-servers/open-websearch"
          install_node_deps "mcp-servers/playwright"
          install_node_deps "mcp-servers/rednote"

          rm -rf mcp-servers/open-websearch/node_modules/npx || true

          if [ -d "mcp-servers/rednote" ] && [ -f "mcp-servers/rednote/package.json" ]; then
            echo "Building rednote MCP (if build script exists)..."
            npm run --prefix mcp-servers/rednote build --if-present
            echo "Pruning rednote dev dependencies..."
            npm prune --prefix mcp-servers/rednote --omit dev
          fi

      - name: Install macOS toolchain for bundled runtime
        shell: bash
        run: |
          brew install pandoc poppler tesseract qpdf pdftk-java
          brew install --cask --no-quarantine libreoffice

      - name: Prepare bundled runtimes (python/node/playwright/tools)
        shell: bash
        run: |
          cd "${APP_DIR}"
          rm -rf runtime/python runtime/node runtime/playwright-browsers runtime/tools
          mkdir -p runtime/node/bin runtime/playwright-browsers runtime/python runtime/tools

          if [ -z "${pythonLocation:-}" ] || [ ! -x "${pythonLocation}/bin/python3" ]; then
            echo "setup-python did not provide a usable pythonLocation"
            exit 1
          fi

          cp -R "${pythonLocation}/." runtime/python/
          runtime/python/bin/python3 -m pip install --upgrade pip setuptools wheel
          runtime/python/bin/python3 -m pip install -r requirements-runtime.txt
          find runtime/python -type d \( -name "__pycache__" -o -name ".pytest_cache" \) -prune -exec rm -rf {} +
          find runtime/python -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete
          test -x runtime/python/bin/python3 || test -x runtime/python/bin/python

          NODE_BIN="$(command -v node)"
          echo "Node bin: ${NODE_BIN}"
          cp "${NODE_BIN}" runtime/node/bin/node
          chmod +x runtime/node/bin/node

          PW_VERSION="$(node -p "try{require('./mcp-servers/playwright/node_modules/playwright/package.json').version}catch(e){''}")"
          REDNOTE_PW_VERSION="$(node -p "try{require('./mcp-servers/rednote/node_modules/playwright/package.json').version}catch(e){''}")"
          echo "playwright version: ${PW_VERSION:-unknown}"
          echo "rednote playwright version: ${REDNOTE_PW_VERSION:-unknown}"

          if [ -x "./mcp-servers/playwright/node_modules/.bin/playwright" ]; then
            PLAYWRIGHT_BROWSERS_PATH="$PWD/runtime/playwright-browsers" \
              ./mcp-servers/playwright/node_modules/.bin/playwright install chromium --no-shell
          else
            echo "Playwright CLI not found under mcp-servers/playwright"
            exit 1
          fi

          if [ -x "./mcp-servers/rednote/node_modules/.bin/playwright" ] && [ "${PW_VERSION}" != "${REDNOTE_PW_VERSION}" ]; then
            PLAYWRIGHT_BROWSERS_PATH="$PWD/runtime/playwright-browsers" \
              ./mcp-servers/rednote/node_modules/.bin/playwright install chromium --no-shell
          elif [ -x "./mcp-servers/rednote/node_modules/.bin/playwright" ]; then
            echo "Skip rednote playwright install (shared version: ${REDNOTE_PW_VERSION})"
          else
            echo "Rednote Playwright CLI not found under mcp-servers/rednote (skip extra browser install)"
          fi
          rm -rf runtime/playwright-browsers/mcp-chrome runtime/playwright-browsers/.links

          stage_formula() {
            local tool_name="$1"
            local formula_name="$2"
            local prefix_path
            prefix_path="$(brew --prefix "${formula_name}" 2>/dev/null || true)"
            if [ -z "${prefix_path}" ] || [ ! -d "${prefix_path}" ]; then
              echo "Missing Homebrew formula '${formula_name}' for tool '${tool_name}'"
              exit 1
            fi
            mkdir -p "runtime/tools/${tool_name}/payload"
            rsync -aL "${prefix_path}/" "runtime/tools/${tool_name}/payload/"
          }

          stage_formula "pandoc" "pandoc"
          stage_formula "poppler" "poppler"
          stage_formula "tesseract" "tesseract"
          stage_formula "qpdf" "qpdf"
          stage_formula "pdftk" "pdftk-java"

          if [ ! -d "/Applications/LibreOffice.app" ]; then
            echo "LibreOffice.app not found under /Applications"
            exit 1
          fi
          mkdir -p "runtime/tools/libreoffice/payload"
          rsync -aL "/Applications/LibreOffice.app/" "runtime/tools/libreoffice/payload/LibreOffice.app/"

          test -x runtime/tools/libreoffice/payload/LibreOffice.app/Contents/MacOS/soffice
          test -x runtime/tools/pandoc/payload/bin/pandoc
          test -x runtime/tools/poppler/payload/bin/pdftoppm
          test -x runtime/tools/poppler/payload/bin/pdftotext
          test -x runtime/tools/tesseract/payload/bin/tesseract
          test -x runtime/tools/qpdf/payload/bin/qpdf
          test -x runtime/tools/pdftk/payload/bin/pdftk

      - name: Install frontend dependencies
        shell: bash
        run: |
          cd "${APP_DIR}/frontend"
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Build macOS DMG/PKG (${{ matrix.arch }})
        shell: bash
        run: |
          cd "${APP_DIR}/frontend"
          npm run electron:build -- --mac dmg pkg --${{ matrix.arch }}

      - name: Generate checksums
        shell: bash
        run: |
          cd "${APP_DIR}/frontend/release"
          files=()
          for p in *.dmg *.pkg *.zip; do
            [ -e "$p" ] && files+=("$p")
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "No macOS artifacts found in release/"
            exit 1
          fi
          shasum -a 256 "${files[@]}" > checksums.sha256

      - name: Upload macOS artifacts (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: paimon-macos-${{ matrix.arch }}
          path: |
            **/frontend/release/*.dmg
            **/frontend/release/*.pkg
            **/frontend/release/*.zip
            **/frontend/release/*.blockmap
            **/frontend/release/latest-mac.yml
            **/frontend/release/checksums.sha256
          if-no-files-found: error
